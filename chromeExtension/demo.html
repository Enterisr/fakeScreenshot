<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Text Classifier Demo</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --card: #ffffff;
        --ink: #16181d;
        --muted: #5f6470;
        --line: #d7dbe3;
        --accent: #d7263d;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--ink);
        background: radial-gradient(
          circle at 20% 10%,
          #ffffff 0%,
          var(--bg) 52%
        );
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 16px 64px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.85rem;
      }

      .lead {
        color: var(--muted);
        margin-bottom: 20px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 18px;
      }

      .legend {
        display: flex;
        gap: 18px;
        flex-wrap: wrap;
      }

      .legend span {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 0.93rem;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
      }

      .dot.pending {
        background: #8e96a8;
      }

      .dot.true {
        background: #d7263d;
      }

      .dot.false {
        background: #1d8f5f;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
      }

      .card img {
        display: block;
        width: 100%;
        height: 180px;
        object-fit: cover;
        background: #ebeef3;
      }

      .meta {
        padding: 12px;
        font-size: 0.9rem;
      }

      .meta strong {
        display: block;
        margin-bottom: 4px;
      }

      .status {
        color: var(--muted);
      }

      .status.true {
        color: #b7152e;
        font-weight: 700;
      }

      .status.false {
        color: #116943;
        font-weight: 700;
      }

      .spacer {
        height: 65vh;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Image Text Classifier Demo</h1>
      <p class="lead">
        Scroll down to trigger lazy detection. The extension writes
        <code>data-has-text</code>
        and visually highlights images detected as news-like text.
      </p>

      <section class="panel legend">
        <span><i class="dot pending"></i> pending</span>
        <span><i class="dot true"></i> detected as text/news-like</span>
        <span><i class="dot false"></i> detected as non-text image</span>
      </section>

      <section id="grid" class="grid"></section>
      <div class="spacer"></div>
    </main>

    <script>
      const demoImages = [
        {
          name: "News Sample 1",
          url: "./news1.jpg",
        },
        {
          name: "News Sample 2",
          url: "./news21.jpg",
        },
        {
          name: "News Sample 3",
          url: "./news3.jpg",
        },
        {
          name: "News Sample 4",
          url: "./news4.jpg",
        },
        {
          name: "Negative Example: catto.jpg",
          url: "./catto.jpg",
        },
      ];

      const grid = document.getElementById("grid");
      const statusByImage = new Map();

      for (const item of demoImages) {
        const card = document.createElement("article");
        card.className = "card";

        const img = document.createElement("img");
        img.loading = "lazy";
        img.decoding = "async";
        img.referrerPolicy = "no-referrer";
        img.src = item.url;
        img.alt = item.name;

        const meta = document.createElement("div");
        meta.className = "meta";

        const title = document.createElement("strong");
        title.textContent = item.name;

        const status = document.createElement("p");
        status.className = "status";
        status.textContent = "pending";

        meta.appendChild(title);
        meta.appendChild(status);
        card.appendChild(img);
        card.appendChild(meta);
        grid.appendChild(card);

        statusByImage.set(img, status);
      }

      const observer = new MutationObserver(() => {
        for (const [img, statusEl] of statusByImage.entries()) {
          const result = img.getAttribute("data-has-text");
          if (result === "true") {
            statusEl.className = "status true";
            statusEl.textContent = "text/news-like detected";
          } else if (result === "false") {
            statusEl.className = "status false";
            statusEl.textContent = "no text/news-like detected";
          }

          const error = img.getAttribute("data-text-scan-error");
          if (error) {
            statusEl.className = "status";
            statusEl.textContent = `error: ${error}`;
          }
        }
      });

      observer.observe(document.documentElement, {
        subtree: true,
        attributes: true,
        attributeFilter: ["data-has-text", "data-text-scan-error"],
      });
    </script>
  </body>
</html>
